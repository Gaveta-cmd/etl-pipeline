spring:
  datasource:
    url: jdbc:h2:mem:etl_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

etl:
  source:
    location: classpath:data/source/entregas_merenda.csv
  chunk-size: 50

logging:
  level:
    org.springframework.batch: WARN
