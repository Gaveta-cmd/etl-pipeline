services:
  mysql:
    image: mysql:8.4
    container_name: etl-pipeline-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: etl_pipeline
      MYSQL_USER: etl
      MYSQL_PASSWORD: etl
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - etl_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  etl_mysql_data:
